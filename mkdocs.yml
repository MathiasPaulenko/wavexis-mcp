site_name: WaveXisMCP
site_description: MCP server exposing the wavexis browser automation library to LLMs — 163 tools, 13 capability tiers, zero Node.js
site_url: https://mathiaspaulenko.github.io/wavexis-mcp/
repo_url: https://github.com/MathiasPaulenko/wavexis-mcp
repo_name: MathiasPaulenko/wavexis-mcp
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    logo: logo
  favicon: assets/images/logo.svg

nav:
  - Home: index.md
  - Guide:
      - Quick Start: quickstart.md
      - Configuration: configuration.md
      - Architecture: architecture.md
      - HTTP Transport: http-transport.md
      - Docker: docker.md
      - Resources & Prompts: resources-prompts.md
      - Rate Limiting: rate-limiting.md
  - Tools:
      - Core: tools/core.md
      - Network: tools/network.md
      - Storage: tools/storage.md
      - Emulation: tools/emulation.md
      - A11y: tools/a11y.md
      - Interactions: tools/interactions.md
      - DevTools: tools/devtools.md
      - Vision: tools/vision.md
      - Video: tools/video.md
      - Testing: tools/testing.md
      - Workflows: tools/workflows.md
      - Data: tools/data.md
      - Experimental: tools/experimental.md
  - Examples:
      - Screenshot: examples/screenshot.md
      - Scrape: examples/scrape.md
      - Testing: examples/testing.md
      - Multi-Action: examples/multi-action.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true
